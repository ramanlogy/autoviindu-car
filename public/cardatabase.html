    display: flex;
    align-items: center;
    gap: 20px;
    flex-wrap: wrap;
    background: #f9f9f9;

  .top .stat { font-size: 12px; color: #555; }

    padding: 8px 16px;
    border-bottom: 1px solid #ddd;
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    align-items: center;
    background: #fff;
  }
  input[type="text"], select {
    border: 1px solid #ccc;
    padding: 5px 8px;
    font-size: 12px;
    border-radius: 3px;
    outline: none;
    background: #fff;
  }
  input[type="text"] { width: 220px; }
  input[type="text"]:focus, select:focus { border-color: #888; }

  button {
    border: 1px solid #ccc;
    padding: 5px 10px;
    font-size: 12px;
    border-radius: 3px;
    background: #fff;
    cursor: pointer;
  }
  button:hover { background: #f0f0f0; }

  .brand-row {
    padding: 7px 16px;
    border-bottom: 1px solid #ddd;
    display: flex;
    flex-wrap: wrap;
    gap: 5px;
    align-items: center;
  }
  .brand-row span { font-size: 11px; color: #888; margin-right: 4px; }
  .bpill {
    border: 1px solid #ccc;
    padding: 3px 9px;
    font-size: 11px;
    border-radius: 12px;
    background: #fff;
    cursor: pointer;
  }
  .bpill:hover { background: #f0f0f0; }
  .bpill.active { background: #111; color: #fff; border-color: #111; }

  .info-row {
    padding: 5px 16px;
    font-size: 11px;
    color: #888;
    border-bottom: 1px solid #eee;
  }

  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    background: #f5f5f5;
    padding: 8px 10px;
    text-align: left;
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    border-bottom: 2px solid #ddd;
    white-space: nowrap;
  }
  tbody tr { border-bottom: 1px solid #eee; }
  tbody tr:hover { background: #fafafa; }
  tbody td { padding: 7px 10px; vertical-align: top; }

  .features-col { font-size: 11px; color: #555; max-width: 260px; line-height: 1.5; }

  .tog {
    border: 1px solid #ccc;
    padding: 3px 9px;
    font-size: 11px;
    border-radius: 3px;
    cursor: pointer;
    white-space: nowrap;
    background: #fff;
  }
  .tog.added { background: #e6f4ea; border-color: #aad4b0; color: #1a6e2e; }
  .tog.pending { background: #fff; border-color: #ccc; color: #555; }
  .tog:hover { opacity: 0.8; }

  .no-results { text-align: center; padding: 40px; color: #999; }
  mark { background: #fff59d; border-radius: 2px; }

  .prog-bar { height: 3px; background: #eee; border-radius: 2px; margin-top: 3px; display:inline-block; vertical-align:middle; }
  .prog-fill { height: 100%; background: #4caf50; border-radius: 2px; transition: width 0.3s; }
</style>
</head>

function parsePrice(p) {
  if (!p || p === 'TBA') return Infinity;
  const m = p.match(/([\d.]+)\s*(Cr|L)/i);
  if (!m) return Infinity;
  return m[2].toLowerCase() === 'cr' ? parseFloat(m[1]) * 100 : parseFloat(m[1]);
}

const SK = 'cardb_v2';
let statuses = {};
try { statuses = JSON.parse(localStorage.getItem(SK) || '{}'); } catch(e) {}

let data = RAW.map((r, i) => ({
  id: i, brand: r[0], model: r[1], body: r[2], type: r[3],
  variant: r[4], price: r[5], transmission: r[6], features: r[7],
  priceNum: parsePrice(r[5]), status: statuses[i] || 'pending'
}));

const brands = [...new Set(data.map(d => d.brand))].sort();
const bodies = [...new Set(data.map(d => d.body))].sort();

const brandRow = document.querySelector('.brand-row');
brands.forEach(b => {
  const btn = document.createElement('button');
  btn.className = 'bpill'; btn.dataset.brand = b; btn.textContent = b;
  brandRow.appendChild(btn);
});

const bodySelect = document.getElementById('f-body');
bodies.forEach(b => { bodySelect.innerHTML += `<option>${b}</option>`; });

let filterBrand = '', filterType = '', filterBody = '', filterStatus = '', search = '', sortKey = 'brand';

function saveStatuses() {
  const s = {};
  data.forEach(d => { if (d.status === 'added') s[d.id] = 'added'; });
  localStorage.setItem(SK, JSON.stringify(s));
}

function hl(text, q) {
  if (!q) return text;
  return text.replace(new RegExp(`(${q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&')})`, 'gi'), '<mark>$1</mark>');
}

function getFiltered() {
  return data.filter(d => {
    if (filterBrand && d.brand !== filterBrand) return false;
    if (filterType && d.type !== filterType) return false;
    if (filterBody && d.body !== filterBody) return false;
    if (filterStatus && d.status !== filterStatus) return false;
    if (search) {
      const q = search.toLowerCase();
      if (![d.brand,d.model,d.body,d.type,d.variant,d.price,d.transmission,d.features].some(f => f.toLowerCase().includes(q))) return false;
    }
    return true;
  });
}

function getSorted(arr) {
  return [...arr].sort((a, b) => {
    if (sortKey === 'price_asc') return a.priceNum - b.priceNum;
    if (sortKey === 'price_desc') return b.priceNum - a.priceNum;
    if (sortKey === 'model') return a.model.localeCompare(b.model);
    return a.brand.localeCompare(b.brand) || a.model.localeCompare(b.model);
  });
}

function render() {
  const filtered = getSorted(getFiltered());
  const q = search.toLowerCase();
  const total = data.length, added = data.filter(d => d.status === 'added').length;
  document.getElementById('s-total').textContent = total;
  document.getElementById('s-added').textContent = added;
  document.getElementById('s-pending').textContent = total - added;
  document.getElementById('s-brands').textContent = brands.length;
  const pct = Math.round(added / total * 100);
  document.getElementById('s-pct').textContent = pct + '%';
  document.getElementById('s-bar').style.width = pct + '%';
  document.getElementById('info-row').innerHTML = `Showing <b>${filtered.length}</b> of <b>${total}</b> entries`;

  document.querySelectorAll('.bpill').forEach(p => p.classList.toggle('active', p.dataset.brand === filterBrand));

  const tbody = document.getElementById('tbody');
  tbody.innerHTML = '';
  document.getElementById('no-results').style.display = filtered.length ? 'none' : 'block';

  filtered.forEach(d => {
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td><b>${hl(d.brand, q)}</b></td>
      <td>${hl(d.model, q)}</td>
      <td style="color:#555;font-size:12px">${hl(d.body, q)}</td>
      <td style="font-size:12px">${hl(d.type, q)}</td>
      <td style="font-size:12px">${hl(d.variant, q)}</td>
      <td style="font-size:12px;white-space:nowrap">${d.price === 'TBA' ? '<i style="color:#999">TBA</i>' : hl(d.price, q)}</td>
      <td style="font-size:11px;color:#555;white-space:nowrap">${hl(d.transmission, q)}</td>
      <td class="features-col">${hl(d.features, q)}</td>
      <td><button class="tog ${d.status}" data-id="${d.id}">${d.status === 'added' ? '✓ Added' : 'Pending'}</button></td>`;
    tbody.appendChild(tr);
  });

  document.querySelectorAll('.tog').forEach(btn => {
    btn.onclick = () => {
      const entry = data.find(d => d.id === +btn.dataset.id);
      entry.status = entry.status === 'added' ? 'pending' : 'added';
      saveStatuses(); render();
    };
  });
}

document.getElementById('search').addEventListener('input', e => { search = e.target.value.trim(); render(); });
document.getElementById('f-type').addEventListener('change', e => { filterType = e.target.value; render(); });
document.getElementById('f-body').addEventListener('change', e => { filterBody = e.target.value; render(); });
document.getElementById('f-status').addEventListener('change', e => { filterStatus = e.target.value; render(); });
document.getElementById('f-sort').addEventListener('change', e => { sortKey = e.target.value; render(); });

document.querySelector('.bpill[data-brand=""]').onclick = function() { filterBrand = ''; render(); };
document.querySelectorAll('.bpill:not([data-brand=""])').forEach(p => {
  p.onclick = () => { filterBrand = filterBrand === p.dataset.brand ? '' : p.dataset.brand; render(); };
});

document.getElementById('btn-all').onclick = () => { data.forEach(d => d.status = 'added'); saveStatuses(); render(); };
document.getElementById('btn-reset').onclick = () => { data.forEach(d => d.status = 'pending'); localStorage.removeItem(SK); render(); };

render();
</script>
